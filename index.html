<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ascent Tea — Premium Japanese Matcha</title>
  <meta name="description" content="Ceremonial-grade Japanese matcha in single-serve stick packs. Drop 01 coming soon.">
  <meta property="og:title" content="Ascent Tea — Premium Japanese Matcha">
  <meta property="og:description" content="Ceremonial-grade Japanese matcha in single-serve stick packs. Drop 01 coming soon.">
  <meta property="og:image" content="https://ascenttea.com/hero.jpg">
  <meta property="og:url" content="https://ascenttea.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-matcha: #2D5016;
      --color-sage: #8B9E7C;
      --color-cream: #FAF7F2;
      --color-cream-dark: #F0EBE3;
      --color-charcoal: #2C2C2C;
      --color-gold: #C4A265;
      --font-heading: 'Cormorant Garamond', 'Palatino', serif;
      --font-body: 'Inter', 'Helvetica Neue', sans-serif;
    }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-charcoal);
      overflow: hidden;
    }

    /* ---- Full-screen hero background ---- */
    .hero {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.15) 0%,
        rgba(255, 255, 255, 0.25) 40%,
        rgba(255, 255, 255, 0.15) 70%,
        rgba(0, 0, 0, 0.1) 100%
      );
    }

    /* ---- Content ---- */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 2rem;
      text-align: center;
      user-select: none;
    }

    .logo {
      width: clamp(280px, 40vw, 500px);
      height: auto;
      margin-bottom: 2rem;
      filter: drop-shadow(0 1px 4px rgba(255, 255, 255, 0.4));
      animation: fadeDown 1s ease-out both;
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: clamp(0.85rem, 1.5vw, 1.1rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(35, 35, 25, 0.85);
      margin-bottom: 0.4rem;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.5);
      animation: fadeIn 1s 0.3s ease-out both;
    }

    .flavors {
      font-family: var(--font-body);
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(35, 35, 25, 0.7);
      margin-bottom: 2.5rem;
      text-shadow: 0 1px 4px rgba(255, 255, 255, 0.5);
      animation: fadeIn 1s 0.5s ease-out both;
    }

    .coming-soon {
      font-family: var(--font-heading);
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: var(--color-charcoal);
      margin-bottom: 1.25rem;
      text-shadow: 0 1px 6px rgba(255, 255, 255, 0.5);
      animation: fadeUp 1s 0.2s ease-out both;
    }

    .drop-label {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: rgba(35, 35, 25, 0.88);
      margin-bottom: 2.5rem;
      position: relative;
      background: linear-gradient(
        160deg,
        rgba(255, 255, 255, 0.55) 0%,
        rgba(255, 255, 255, 0.18) 50%,
        rgba(255, 255, 255, 0.30) 100%
      );
      backdrop-filter: blur(24px) saturate(1.8) brightness(1.08);
      -webkit-backdrop-filter: blur(24px) saturate(1.8) brightness(1.08);
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      display: inline-block;
      white-space: nowrap;
      border: 0.5px solid rgba(255, 255, 255, 0.5);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-left-color: rgba(255, 255, 255, 0.6);
      animation: fadeIn 1s 0.7s ease-out both;
    }

    /* ---- Email signup ---- */
    .signup {
      display: flex;
      gap: 0;
      max-width: 440px;
      width: 100%;
      animation: fadeUp 1s 0.9s ease-out both;
    }

    .signup input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      color: var(--color-charcoal);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 0.5px solid rgba(50, 50, 40, 0.12);
      border-right: none;
      border-radius: 2px 0 0 2px;
      outline: none;
      transition: all 0.3s ease;
    }

    .signup input::placeholder {
      color: rgba(50, 50, 40, 0.38);
      letter-spacing: 0.04em;
    }

    .signup input:focus {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(50, 50, 40, 0.2);
    }

    .signup button {
      padding: 0.85rem 1.8rem;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-cream);
      background: var(--color-charcoal);
      border: 1px solid var(--color-charcoal);
      border-radius: 0 2px 2px 0;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .signup button:hover {
      background: var(--color-matcha);
      border-color: var(--color-matcha);
    }

    .signup-note {
      font-size: 0.7rem;
      color: rgba(35, 35, 25, 0.5);
      margin-top: 0.75rem;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.4);
      animation: fadeIn 1s 1.1s ease-out both;
    }

    /* ---- Instagram link ---- */
    .social {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      animation: fadeIn 1s 1.3s ease-out both;
    }

    .social a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(35, 35, 25, 0.5);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      transition: color 0.3s ease;
      text-shadow: 0 1px 3px rgba(255, 255, 255, 0.4);
    }

    .social a:hover {
      color: var(--color-charcoal);
    }

    .social svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ---- Animations ---- */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- Mobile ---- */
    @media (max-width: 520px) {
      .signup {
        flex-direction: column;
        gap: 0;
      }
      .signup input {
        border-right: 0.5px solid rgba(50, 50, 40, 0.12);
        border-radius: 2px 2px 0 0;
        border-bottom: none;
      }
      .signup button {
        border-radius: 0 0 2px 2px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="hero.jpg" alt="Japanese tea fields at sunrise with misty mountains">
    <div class="hero-overlay"></div>
  </div>

  <main class="content">
    <img src="logo-dark.png" alt="Ascent Tea" class="logo">
    <p class="subtitle">Drop 01</p>
    <p class="flavors">Kinako · Kuromitsu · Matcha</p>
    <h1 class="coming-soon">Coming Soon</h1>
    <p class="drop-label">Limited to 200 kits · Join our first drop</p>
    <form class="signup" action="#" onsubmit="return handleSignup(event)">
      <input type="email" name="email" placeholder="Your email address" required autocomplete="email">
      <button type="submit">Join the First Drop</button>
    </form>
    <p class="signup-note">Be first to know when we launch. No spam, ever.</p>
  </main>

  <div class="social">
    <a href="https://instagram.com/ascent_tea" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
      </svg>
      @ascent_tea
    </a>
  </div>

  <script>
    const KLAVIYO_COMPANY_ID = 'Y8z2AN';
    const KLAVIYO_LIST_ID = 'SWd8Re';

    async function handleSignup(e) {
      e.preventDefault();
      const input = e.target.querySelector('input');
      const button = e.target.querySelector('button');
      const email = input.value;

      button.textContent = 'Sending...';
      button.disabled = true;

      try {
        const res = await fetch('https://a.klaviyo.com/client/subscriptions/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'revision': '2024-10-15'
          },
          body: JSON.stringify({
            data: {
              type: 'subscription',
              attributes: {
                custom_source: 'Coming Soon Page',
                profile: {
                  data: {
                    type: 'profile',
                    attributes: { email: email }
                  }
                }
              },
              relationships: {
                list: {
                  data: { type: 'list', id: KLAVIYO_LIST_ID }
                }
              }
            }
          })
        });

        if (res.ok || res.status === 202) {
          button.textContent = 'You\'re In';
          button.style.background = '#2D5016';
          button.style.borderColor = '#2D5016';
          input.disabled = true;
        } else {
          throw new Error('API error');
        }
      } catch (err) {
        button.textContent = 'Try Again';
        button.disabled = false;
        button.style.background = '#8B4513';
        button.style.borderColor = '#8B4513';
      }
    }
  </script>

</body>
</html>
